trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
  - script: |
      docker run -d --name juiceshop -p 3000:3000 bkimminich/juice-shop
      echo "Aguardando JuiceShop..."
      sleep 30
    displayName: '1. Start JuiceShop'

  - script: |
      docker run --rm \
        --network host \
        -v $(Build.ArtifactStagingDirectory):/zap/wrk \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py \
        -t http://localhost:3000 \
        -r zap_report.html \
        -I
    displayName: '2. ZAP Baseline Scan'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'zap-report'
    displayName: '3. Publish Report'
    condition: always()
